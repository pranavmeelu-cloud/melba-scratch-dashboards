<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Victoria Street - Dashboard History</title><style>
:root{--bg:#0f1419;--card:#1a1f2e;--card-2:#232938;--ink:#e6edf3;--muted:#7d8ba1;--border:#2a3547;--green:#4ade80;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;--orange:#f97316}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:20px;line-height:1.5}
.container{max-width:1100px;margin:0 auto}
h1{font-size:1.6rem;font-weight:700}
.pill{display:inline-block;font-size:.7rem;font-weight:600;padding:3px 9px;border-radius:99px;background:var(--card-2);color:var(--muted);margin-left:8px;text-transform:uppercase;letter-spacing:.05em}
.pill.team{background:#2a1f4a;color:#c4b5fd}
.pill.owner{background:#172a4a;color:#9bc4ff}
.pill.green{background:#0d2a1a;color:var(--green)}
.pill.deepgreen{background:#0a2e18;color:#86efac}
.pill.amber{background:#2a2010;color:var(--amber)}
.pill.red{background:#2a1010;color:var(--red)}
.pill.orange{background:#2a1a08;color:var(--orange)}
.subtitle{color:var(--muted);font-size:.85rem;margin:6px 0 18px}
.wtd-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.wtd-card.team{grid-template-columns:repeat(2,1fr)}
.wtd-card .l{font-size:.7rem;text-transform:uppercase;color:var(--muted);letter-spacing:.05em;margin-bottom:4px}
.wtd-card .v{font-size:1.3rem;font-weight:700}
.wtd-card .s{font-size:.72rem;color:var(--muted);margin-top:2px}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:.85rem}
th{font-size:.7rem;text-transform:uppercase;color:var(--muted);letter-spacing:.05em;background:#16203a}
td.r{text-align:right;font-variant-numeric:tabular-nums}
td.c{text-align:center}
tr.wtd-row td{border-bottom:2px solid #3a4f6a;color:var(--muted);background:#171e2e}
a{color:#9bc4ff;text-decoration:none}
a:hover{text-decoration:underline}
</style></head><body><div class="container">
<h1>Victoria Street <span class="pill team">Team View</span></h1>
<div class="subtitle">Dashboard History</div>
<div class="wtd-card team"><div><div class="l">Current Week Revenue</div><div class="v">$18,256.25</div></div><div><div class="l">Current Week Margin</div><div class="v"><span class="pill amber">18.9%</span></div></div></div>
<table id="hist"><thead><tr><th>Date</th><th class="r">Revenue</th><th class="c">Margin</th><th></th></tr></thead><tbody id="hist-body"></tbody></table>
<script>
const HISTORY_DATA = [{"date":"2026-06-05","label":"Fri 5 Jun 2026","revenue":2670.69,"margin":20.43,"surplus":545.73,"file":"Victoria Street – 2026-06-05 Friday – Team Dashboard.html"},{date:"2026-06-04",label:"Thu 4 Jun 2026",revenue:5407.88,margin:35.4,surplus:1914.14,file:"Victoria Street – 2026-06-04 Thursday – Team Dashboard.html"},{"label":"Wed 3 Jun 2026","surplus":968.44,"revenue":4750.33,"date":"2026-06-03","margin":20.39,"file":"Victoria Street – 2026-06-03 Wednesday – Team Dashboard.html"},{date:"2026-06-02",label:"Tue 2 Jun 2026",revenue:5427.35,margin:1.97,surplus:107.04,file:"Victoria Street – 2026-06-02 Tuesday – Team Dashboard.html"},{date:"2026-06-01",label:"Mon 1 Jun 2026",revenue:0,margin:0,surplus:-78.05,file:"Victoria Street – 2026-06-01 Monday – Team Dashboard.html"},{date:"2026-05-31",label:"Sun 31 May 2026",revenue:0,margin:0,surplus:-49.36,file:"Victoria Street – 2026-05-31 Sunday – Team Dashboard.html"},{"date":"2026-05-30","label":"Sat 30 May 2026","revenue":0.00,"margin":null,"surplus":-49.36,"file":"Victoria Street – 2026-05-30 Saturday – Team Dashboard.html"},{"date":"2026-05-29","label":"Fri 29 May 2026","revenue":1779.5,"margin":-26.555774093846583,"surplus":-472.56,"file":"Victoria Street – 2026-05-29 Friday – Team Dashboard.html"},{"date":"2026-05-28","label":"Thu 28 May 2026","revenue":5697.93,"margin":44.02,"surplus":2508.32,"file":"Victoria Street – 2026-05-28 Thursday – Team Dashboard.html"},{"date":"2026-05-27","label":"Wed 27 May 2026","revenue":5413.03,"margin":-25.04,"surplus":-1355.45,"file":"Victoria Street – 2026-05-27 Wednesday – Team Dashboard.html"},{"date":"2026-05-26","label":"Tue 26 May 2026","revenue":7610.91,"margin":37.50,"surplus":2853.89,"file":"Victoria Street – 2026-05-26 Tuesday – Team Dashboard.html"},{"date":"2026-05-25","label":"Mon 25 May 2026","revenue":2155.19,"margin":-19.53,"surplus":-420.93,"file":"Victoria Street – 2026-05-25 Monday – Team Dashboard.html"},{"date":"2026-05-24","label":"Sun 24 May 2026","revenue":0.00,"margin":0,"surplus":-154.41,"file":"Victoria Street – 2026-05-24 Sunday – Team Dashboard.html"},{"date":"2026-05-23","label":"Sat 23 May 2026","revenue":0.00,"margin":0,"surplus":-169.20,"file":"Victoria Street – 2026-05-23 Saturday – Team Dashboard.html"},{"date":"2026-05-22","label":"Fri 22 May 2026","revenue":2006.94,"margin":-8.59,"surplus":-172.37,"file":"Victoria Street – 2026-05-22 Friday – Team Dashboard.html"},{"date":"2026-05-21","label":"Thu 21 May 2026","revenue":5979.73,"margin":-7.76,"surplus":-464.19,"file":"Victoria Street – 2026-05-21 Thursday – Team Dashboard.html"},{"date":"2026-05-20","label":"Wed 20 May 2026","revenue":3225.89,"margin":-47.09,"surplus":-1519.01,"file":"Victoria Street – 2026-05-20 Wednesday – Team Dashboard.html"},{"date":"2026-05-19","label":"Tue 19 May 2026","revenue":4360.69,"margin":-26.84,"surplus":-1170.51,"file":"Victoria Street – 2026-05-19 Tuesday – Team Dashboard.html"},{"date":"2026-05-18","label":"Mon 18 May 2026","revenue":2514.63,"margin":-17.81,"surplus":-447.95,"file":"Victoria Street – 2026-05-18 Monday – Team Dashboard.html"}];
const WTD_HISTORY = [{"week_start":"2026-06-01","days_included":["mon","tue","wed","thu","fri"],"revenue":18256.25,"surplus":3457.3,"margin":18.94},{week_start:"2026-05-25",days_included:["mon","tue","wed","thu","fri","sat","sun"],revenue:22656.56,surplus:3014.55,margin:13.31},{"week_start":"2026-05-18","days_included":["mon","tue","wed","thu","fri","sat","sun"],"revenue":18087.88,"surplus":-4094.74,"margin":-22.65}];
const THRESH = 20;
function n0(x){if(x===null||x===undefined||isNaN(x))return null;return Number(x)}
function mPct(m){if(m===null)return "&mdash;";return m.toFixed(1)+"%"}
function fmt(v){if(v===null||v===undefined)return "$0.00";return "$"+Number(v).toLocaleString("en-NZ",{minimumFractionDigits:2,maximumFractionDigits:2})}
function pillCls(m,t){if(m===null)return "";if(m<0)return "red";if(m>=t+10)return "deepgreen";if(m>=t)return "green";if(m>=t-5)return "amber";return "orange"}
function pill(m){return '<span class="pill '+pillCls(m,THRESH)+'">'+mPct(m)+'</span>'}
function isoWeek(dStr){var d=new Date(dStr);var day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return d.toISOString().substring(0,10)}
var body=document.getElementById("hist-body");
var byWeek={};HISTORY_DATA.forEach(function(r){var k=isoWeek(r.date);(byWeek[k]=byWeek[k]||[]).push(r)});
var wtdByWeek={};WTD_HISTORY.forEach(function(w){wtdByWeek[w.week_start]=w});
var wkOrder=Object.keys(byWeek).sort().reverse();
wkOrder.forEach(function(wk){
  var w=wtdByWeek[wk];
  if(w){
    var rng=(w.days_included||[]).join("-").toUpperCase();
    body.insertAdjacentHTML("beforeend",'<tr class="wtd-row"><td>Week to Date '+rng+'</td><td class="r">'+fmt(w.revenue)+'</td><td class="c">'+pill(n0(w.margin))+'</td><td></td></tr>');
  }
  byWeek[wk].forEach(function(r){
    body.insertAdjacentHTML("beforeend",'<tr><td>'+r.label+'</td><td class="r">'+fmt(r.revenue)+'</td><td class="c">'+pill(n0(r.margin))+'</td><td><a href="'+r.file+'">Open</a></td></tr>');
  });
});
</script></div></body></html>
