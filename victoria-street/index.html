<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Victoria Street – Dashboard History</title>
<style>
:root{--bg:#0f1419;--card:#1a1f2e;--card-2:#232938;--ink:#e6edf3;--muted:#7d8ba1;--border:#2a3547;--green:#4ade80;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;--purple:#a78bfa;--orange:#f97316}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:20px;line-height:1.5}
.container{max-width:1200px;margin:0 auto}
h1{font-size:1.6rem;font-weight:700;margin-bottom:6px}
.pill{display:inline-block;font-size:.7rem;font-weight:600;padding:3px 9px;border-radius:99px;background:var(--card-2);color:var(--muted);margin-left:8px;text-transform:uppercase;letter-spacing:.05em}
.pill.owner{background:#172a4a;color:#9bc4ff}
.pill.team{background:#2a1f4a;color:#c4b5fd}
.pill.green{background:#0d2a1a;color:var(--green)}
.pill.amber{background:#2a2010;color:var(--amber)}
.pill.red{background:#2a1010;color:var(--red)}
.pill.deepgreen{background:#0a2e18;color:#86efac}
.pill.orange{background:#2a1a08;color:var(--orange)}
.subtitle{color:var(--muted);font-size:.9rem;margin-bottom:18px}
.wtd-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:18px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.wtd-card .l{font-size:.7rem;text-transform:uppercase;color:var(--muted);letter-spacing:.05em;margin-bottom:4px}
.wtd-card .v{font-size:1.5rem;font-weight:700;font-variant-numeric:tabular-nums}
table.idx{width:100%;border-collapse:collapse;font-size:.86rem;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
table.idx th,table.idx td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
table.idx th{color:var(--muted);text-transform:uppercase;font-size:.7rem;letter-spacing:.05em;background:var(--card-2)}
table.idx td.r{text-align:right;font-variant-numeric:tabular-nums}
table.idx a{color:var(--blue);text-decoration:none}
table.idx a:hover{text-decoration:underline}
tr.wtd-row{font-weight:600}
tr.wtd-row td{border-bottom:2px solid #3a4f6a;color:var(--muted)}
</style>
</head>
<body>
<div class="container">
<h1>Victoria Street <span class="pill team">Team View</span> <span class="pill">Dashboard History</span></h1>
<div class="subtitle">Daily Team Dashboards · WTD rows pinned above each week</div>
<div class="wtd-card">
<div><div class="l">Current Week Revenue</div><div class="v">$19,935.63</div></div>
<div><div class="l">Current Week Surplus</div><div class="v">$799.95</div></div>
<div><div class="l">Current Week Margin</div><div class="v">4.0%</div></div>
</div>
<table class="idx"><thead><tr><th>Date</th><th>Revenue</th><th>Surplus</th><th>Margin</th><th></th></tr></thead><tbody id="tb"></tbody></table>
</div>
<script>
const HISTORY_DATA = [{date:"2026-05-31",label:"Sun 31 May 2026",revenue:0,margin:0,surplus:-154.41,file:"Victoria Street – 2026-05-31 Sunday – Team Dashboard.html"},{"date":"2026-05-30","label":"Sat 30 May 2026","revenue":0.00,"margin":null,"surplus":-49.36,"file":"Victoria Street – 2026-05-30 Saturday – Team Dashboard.html"},{"date":"2026-05-29","label":"Fri 29 May 2026","revenue":1779.5,"margin":-26.555774093846583,"surplus":-472.56,"file":"Victoria Street – 2026-05-29 Friday – Team Dashboard.html"},{"date":"2026-05-28","label":"Thu 28 May 2026","revenue":5697.93,"margin":44.02,"surplus":2508.32,"file":"Victoria Street – 2026-05-28 Thursday – Team Dashboard.html"},{"date":"2026-05-27","label":"Wed 27 May 2026","revenue":5413.03,"margin":-25.04,"surplus":-1355.45,"file":"Victoria Street – 2026-05-27 Wednesday – Team Dashboard.html"},{"date":"2026-05-26","label":"Tue 26 May 2026","revenue":4889.98,"margin":15.22,"surplus":744.34,"file":"Victoria Street – 2026-05-26 Tuesday – Team Dashboard.html"},{"date":"2026-05-25","label":"Mon 25 May 2026","revenue":2155.19,"margin":-19.53,"surplus":-420.93,"file":"Victoria Street – 2026-05-25 Monday – Team Dashboard.html"},{"date":"2026-05-24","label":"Sun 24 May 2026","revenue":0.00,"margin":0,"surplus":-154.41,"file":"Victoria Street – 2026-05-24 Sunday – Team Dashboard.html"},{"date":"2026-05-23","label":"Sat 23 May 2026","revenue":0.00,"margin":0,"surplus":-169.20,"file":"Victoria Street – 2026-05-23 Saturday – Team Dashboard.html"},{"date":"2026-05-22","label":"Fri 22 May 2026","revenue":2006.94,"margin":-8.59,"surplus":-172.37,"file":"Victoria Street – 2026-05-22 Friday – Team Dashboard.html"},{"date":"2026-05-21","label":"Thu 21 May 2026","revenue":5979.73,"margin":-7.76,"surplus":-464.19,"file":"Victoria Street – 2026-05-21 Thursday – Team Dashboard.html"},{"date":"2026-05-20","label":"Wed 20 May 2026","revenue":3225.89,"margin":-47.09,"surplus":-1519.01,"file":"Victoria Street – 2026-05-20 Wednesday – Team Dashboard.html"},{"date":"2026-05-19","label":"Tue 19 May 2026","revenue":4360.69,"margin":-26.84,"surplus":-1170.51,"file":"Victoria Street – 2026-05-19 Tuesday – Team Dashboard.html"},{"date":"2026-05-18","label":"Mon 18 May 2026","revenue":2514.63,"margin":-17.81,"surplus":-447.95,"file":"Victoria Street – 2026-05-18 Monday – Team Dashboard.html"}];
const WTD_HISTORY = [{week_start:"2026-05-25",days_included:["mon","tue","wed","thu","fri","sat","sun"],revenue:19935.63,surplus:799.95,margin:4.01},{"week_start":"2026-05-18","days_included":["mon","tue","wed","thu","fri","sat","sun"],"revenue":18087.88,"surplus":-4094.74,"margin":-22.65}];
const THR = 20;
function isoWeek(iso){const d=new Date(iso);const day=(d.getUTCDay()+6)%7;d.setUTCDate(d.getUTCDate()-day);return d.toISOString().slice(0,10);}
function fmt(n){return '$'+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function pctCls(m,t){return m>=t+10?'deepgreen':m>=t?'green':m>=t-5?'amber':m>=0?'orange':'red';}
function render(){
  const groups={};
  HISTORY_DATA.forEach(r=>{const w=isoWeek(r.date);if(!groups[w])groups[w]=[];groups[w].push(r);});
  const tb=document.getElementById('tb');tb.innerHTML='';
  const sortedWeeks=Object.keys(groups).sort().reverse();
  const dayMap={mon:'Mon',tue:'Tue',wed:'Wed',thu:'Thu',fri:'Fri',sat:'Sat',sun:'Sun'};
  sortedWeeks.forEach(w=>{
    const wtd=WTD_HISTORY.find(x=>x.week_start===w);
    if(wtd){
      const tr=document.createElement('tr');tr.className='wtd-row';
      const dlist=(wtd.days_included||[]).map(d=>dayMap[d]).join(' ');
      tr.innerHTML='<td>Week to Date<br><span style="font-weight:400;font-size:.78rem">'+dlist+'</span></td><td class="r">'+fmt(wtd.revenue)+'</td><td class="r">'+fmt(wtd.surplus)+'</td><td><span class="pill '+pctCls(wtd.margin,THR)+'">'+wtd.margin.toFixed(1)+'%</span></td><td></td>';
      tb.appendChild(tr);
    }
    groups[w].forEach(r=>{
      const tr=document.createElement('tr');
      tr.innerHTML='<td>'+r.label+'</td><td class="r">'+fmt(r.revenue)+'</td><td class="r">'+fmt(r.surplus)+'</td><td><span class="pill '+pctCls(r.margin,THR)+'">'+r.margin.toFixed(1)+'%</span></td><td><a href="'+r.file+'">Open '+'→'+'</a></td>';
      tb.appendChild(tr);
    });
  });
}
render();
</script>
</body>
</html>
