<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Victoria Street — Team Dashboard History</title>
<style>
:root{--bg:#0f1419;--card:#1a1f2e;--card2:#232938;--green:#4ade80;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;--orange:#f97316;--text:#e2e8f0;--muted:#94a3b8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:14px;padding:24px;max-width:900px;margin:0 auto}
h1{font-size:1.5rem;font-weight:700;margin-bottom:4px}
.subtitle{color:var(--muted);font-size:.9rem;margin-bottom:20px}
.pill{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.75rem;background:#1e2a3a;color:var(--blue);margin-left:8px;font-weight:500}
.intro{background:var(--card);border-radius:10px;padding:14px;border:1px solid #2a3547;font-size:.85rem;color:var(--muted);margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:.9rem;background:var(--card);border-radius:10px;overflow:hidden;border:1px solid #2a3547}
th{background:#0f1419;padding:10px 12px;text-align:left;color:var(--muted);font-weight:500;border-bottom:1px solid #2a3547}
td{padding:10px 12px;border-bottom:1px solid #1e2535}
tr:last-child td{border:none}
.mpill{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.78rem;font-weight:600;border:1px solid}
.tier-deep{color:#4ade80;background:#0a2e18;border-color:#4ade80}
.tier-green{color:#4ade80;background:#0d261a;border-color:#4ade80}
.tier-amber{color:#fbbf24;background:#262010;border-color:#fbbf24}
.tier-orange{color:#f97316;background:#261a08;border-color:#f97316}
.tier-red{color:#f87171;background:#261010;border-color:#f87171}
a.open{color:var(--blue);text-decoration:none;font-weight:500}
a.open:hover{text-decoration:underline}
/* WTD card */
.wtd-card{background:var(--card);border-radius:10px;padding:16px 18px;border:1px solid #2a3547;margin-bottom:16px}
.wtd-heading{font-size:.72rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:12px;font-weight:600}
.wtd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.wtd-item{display:flex;flex-direction:column;gap:3px}
.wtd-lbl{font-size:.7rem;color:var(--muted)}
.wtd-val{font-size:1.05rem;font-weight:700}
.wtd-adj{font-size:.75rem;color:var(--amber);margin-top:10px;padding-top:10px;border-top:1px solid #2a3547}
</style>
</head>
<body>
<h1>Victoria Street — Dashboard History <span class="pill">Team View</span></h1>
<div class="subtitle">Bookmark this page · daily team dashboards listed most recent first</div>
<div class="intro">Each row links to that day's team dashboard. Margin pill is colour-coded vs the 20% daily target.</div>

<div id="wtd-section"></div>

<table id="hist">
  <thead><tr><th>Date</th><th>Revenue</th><th>Margin</th><th></th></tr></thead>
  <tbody></tbody>
</table>

<script>
const WTD_SUMMARY = {
  week_start: "2026-05-18",
  days_included: ["mon","tue","wed","thu"],
  revenue: 16080.94,
  surplus: -3601.66,
  margin: -22.40,
  prior_week_adjustments: []
};

const HISTORY_DATA = [
  { date: "2026-05-21", label: "Thu 21 May 2026", revenue: 5979.73, margin: -7.76, surplus: -464.19, file: "Victoria Street – 2026-05-21 Thursday – Team Dashboard.html" },
  { date: "2026-05-20", label: "Wed 20 May 2026", revenue: 3225.89, margin: -47.09, surplus: -1519.01, file: "Victoria Street – 2026-05-20 Wednesday – Team Dashboard.html" },
  { date: "2026-05-19", label: "Tue 19 May 2026", revenue: 4360.69, margin: -26.84, surplus: -1170.51, file: "Victoria Street – 2026-05-19 Tuesday – Team Dashboard.html" },
  { date: "2026-05-18", label: "Mon 18 May 2026", revenue: 2514.63, margin: -17.81, surplus: -447.95, file: "Victoria Street – 2026-05-18 Monday – Team Dashboard.html" }
];
const THRESHOLD = 20;

function tierClass(m){
  if(m >= THRESHOLD+10) return "tier-deep";
  if(m >= THRESHOLD) return "tier-green";
  if(m >= THRESHOLD-5) return "tier-amber";
  if(m >= 0) return "tier-orange";
  return "tier-red";
}
function fmt$(v){ var s=Math.abs(v).toLocaleString('en-NZ',{minimumFractionDigits:2,maximumFractionDigits:2}); return (v<0?"−$":"$")+s; }
function fmtSurplus(v){ var s=Math.abs(v).toLocaleString('en-NZ',{minimumFractionDigits:2,maximumFractionDigits:2}); return (v<0?"−$":"+$")+s; }

// Render WTD card
(function(){
  const w = WTD_SUMMARY;
  const dayCount = w.days_included.length;
  const dayNames = {mon:"Mon",tue:"Tue",wed:"Wed",thu:"Thu",fri:"Fri",sat:"Sat",sun:"Sun"};
  const dayRange = dayCount > 0
    ? (dayCount === 1 ? dayNames[w.days_included[0]] : dayNames[w.days_included[0]] + " – " + dayNames[w.days_included[dayCount-1]])
    : "—";
  const weekLabel = "Week to Date · " + dayRange + " · " + dayCount + (dayCount===1?" day":" days");
  const surplusColour = w.surplus >= 0 ? "#4ade80" : "#f87171";

  var html = `<div class="wtd-card">
    <div class="wtd-heading">${weekLabel}</div>
    <div class="wtd-grid">
      <div class="wtd-item">
        <div class="wtd-lbl">Revenue</div>
        <div class="wtd-val">$${w.revenue.toLocaleString('en-NZ',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
      </div>
      <div class="wtd-item">
        <div class="wtd-lbl">Surplus</div>
        <div class="wtd-val" style="color:${surplusColour}">${fmtSurplus(w.surplus)}</div>
      </div>
      <div class="wtd-item">
        <div class="wtd-lbl">Margin</div>
        <div class="wtd-val"><span class="mpill ${tierClass(w.margin)}">${w.margin.toFixed(1)}%</span></div>
      </div>
    </div>`;

  if(w.prior_week_adjustments && w.prior_week_adjustments.length > 0){
    html += `<div class="wtd-adj">`;
    w.prior_week_adjustments.forEach(function(adj){
      html += `⚠ ${adj.supplier} invoice dated ${adj.invoice_date} — ${adj.missed_prior_days} prior-week days' cost included this week<br>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  document.getElementById("wtd-section").innerHTML = html;
})();

// Render history table
const tb = document.querySelector("#hist tbody");
HISTORY_DATA.forEach(r => {
  const tr = document.createElement("tr");
  tr.innerHTML = `<td>${r.label}</td><td>${fmt$(r.revenue)}</td><td><span class="mpill ${tierClass(r.margin)}">${r.margin.toFixed(1)}%</span></td><td><a class="open" href="${r.file}">Open →</a></td>`;
  tb.appendChild(tr);
});
</script>
</body>
</html>
