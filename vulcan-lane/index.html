<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vulcan Lane – Dashboard History</title>
<style>
:root{--bg:#0f1419;--card:#1a1f2e;--card-2:#232938;--ink:#e6edf3;--muted:#7d8ba1;--border:#2a3547;--green:#4ade80;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;--orange:#f97316}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:20px;line-height:1.5}
.container{max-width:1100px;margin:0 auto}
h1{font-size:1.7rem;font-weight:700;margin-bottom:6px}
.pill{display:inline-block;font-size:.7rem;font-weight:600;padding:3px 9px;border-radius:99px;background:#2a1f0d;color:#fbbf24;margin-left:8px;text-transform:uppercase;letter-spacing:.05em}
.subtitle{color:var(--muted);font-size:.9rem;margin-bottom:18px}
.wtdcard{background:linear-gradient(135deg,#172a4a,#1a1f2e);border:1px solid var(--blue);padding:16px;border-radius:8px;margin-bottom:18px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.wtdcard .l{font-size:.7rem;text-transform:uppercase;color:var(--muted);letter-spacing:.05em;margin-bottom:4px}
.wtdcard .v{font-size:1.5rem;font-weight:700}
.section{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:18px}
table.hist{width:100%;border-collapse:collapse;font-size:.85rem}
table.hist th{background:var(--card-2);text-align:left;padding:10px;color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
table.hist td{padding:9px 10px;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums}
table.hist td.r{text-align:right}
table.hist tr.wtd-row td{border-bottom:2px solid #3a4f6a;color:var(--muted);background:rgba(96,165,250,.04)}
table.hist a{color:var(--blue);text-decoration:none}
table.hist a:hover{text-decoration:underline}
.mpill{display:inline-block;padding:3px 9px;border-radius:99px;font-size:.7rem;font-weight:600}
.mpill.deepgreen{background:#0a2e18;color:#4ade80}
.mpill.green{background:#0d261a;color:#4ade80}
.mpill.amber{background:#2a1f08;color:#fbbf24}
.mpill.orange{background:#261a08;color:#f97316}
.mpill.red{background:#261010;color:#f87171}
</style>
</head>
<body>
<div class="container">
<h1>Vulcan Lane — Dashboard History <span class="pill">Team View</span></h1>
<div class="subtitle">All team dashboards — most recent first — threshold 20%</div>

<div class="wtdcard" id="wtd-card">
  <div><div class="l">WTD Revenue</div><div class="v">$14,418.31</div></div>
  <div><div class="l">WTD Surplus</div><div class="v" style="color:var(--red)">−`$788.49</div></div>
  <div><div class="l">WTD Margin</div><div class="v">-5.47%</div></div>
</div>

<div class="section">
<table class="hist"><thead><tr><th>Date</th><th class="r">Revenue</th><th>Margin</th><th></th></tr></thead>
<tbody id="hist-body"></tbody></table>
</div>
</div>
<script>
const HISTORY_DATA = [{"date":"2026-05-29","label":"Fri 29 May 2026","revenue":2515.66,"margin":-57.346779771511258,"surplus":-1442.65,"file":"Vulcan Lane – 2026-05-29 Friday – Team Dashboard.html"},{"date":"2026-05-28","label":"Thu 28 May 2026","revenue":3084.45,"margin":13.78,"surplus":424.98,"file":"Vulcan Lane – 2026-05-28 Thursday – Team Dashboard.html"},{"date":"2026-05-27","label":"Wed 27 May 2026","revenue":2642.42,"margin":-25.1,"surplus":-663.31,"file":"Vulcan Lane – 2026-05-27 Wednesday – Team Dashboard.html"},{"date":"2026-05-26","label":"Tue 26 May 2026","revenue":3203.35,"margin":15.66,"surplus":501.59,"file":"Vulcan Lane – 2026-05-26 Tuesday – Team Dashboard.html"},{"date":"2026-05-25","label":"Mon 25 May 2026","revenue":2972.43,"margin":13.15,"surplus":390.9,"file":"Vulcan Lane – 2026-05-25 Monday – Team Dashboard.html"},{"date":"2026-05-24","label":"Sun 24 May 2026","revenue":4549.74,"margin":10.55,"surplus":479.87,"file":"Vulcan Lane – 2026-05-24 Sunday – Team Dashboard.html"},{"date":"2026-05-23","label":"Sat 23 May 2026","revenue":4655.96,"margin":33.45,"surplus":1557.32,"file":"Vulcan Lane – 2026-05-23 Saturday – Team Dashboard.html"},{"date":"2026-05-22","label":"Fri 22 May 2026","revenue":4006.31,"margin":24.51,"surplus":981.84,"file":"Vulcan Lane – 2026-05-22 Friday – Team Dashboard.html"},{"date":"2026-05-21","label":"Thu 21 May 2026","revenue":3089.53,"margin":14.24,"surplus":440.03,"file":"Vulcan Lane – 2026-05-21 Thursday – Team Dashboard.html"},{"date":"2026-05-20","label":"Wed 20 May 2026","revenue":2628.97,"margin":-0.03,"surplus":-0.88,"file":"Vulcan Lane – 2026-05-20 Wednesday – Team Dashboard.html"},{"date":"2026-05-19","label":"Tue 19 May 2026","revenue":3662.35,"margin":25.75,"surplus":942.99,"file":"Vulcan Lane – 2026-05-19 Tuesday – Team Dashboard.html"},{"date":"2026-05-18","label":"Mon 18 May 2026","revenue":2438.33,"margin":5.59,"surplus":136.42,"file":"Vulcan Lane – 2026-05-18 Monday – Team Dashboard.html"}];
const WTD_HISTORY = [{"week_start":"2026-05-25","days_included":["mon","tue","wed","thu","fri"],"revenue":14418.31,"surplus":-788.48999999999887,"margin":-5.4686714323661993},{"week_start":"2026-05-18","days_included":["mon","tue","wed","thu","fri","sat","sun"],"revenue":25031.19,"surplus":4537.59,"margin":18.13}];
const THRESHOLD = 20;
function isoWeekStart(d){const dt=new Date(d);const day=(dt.getDay()+6)%7;dt.setDate(dt.getDate()-day);return dt.toISOString().slice(0,10);}
function fmtMoney(v){if(v===null||v===undefined)return "";const sign=v<0?"−":(v>0?"+":"");return sign+"$"+Math.abs(v).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");}
function pill(m){let cls="red";if(m>=THRESHOLD+10)cls="deepgreen";else if(m>=THRESHOLD)cls="green";else if(m>=THRESHOLD-5)cls="amber";else if(m>=0)cls="orange";return '<span class="mpill '+cls+'">'+m.toFixed(2)+'%</span>';}
const grouped={};const order=[];
HISTORY_DATA.forEach(e=>{const wk=isoWeekStart(e.date);if(!grouped[wk]){grouped[wk]=[];order.push(wk);}grouped[wk].push(e);});
const tbody=document.getElementById("hist-body");
order.forEach(wk=>{
  const wtd=WTD_HISTORY.find(w=>w.week_start===wk);
  if(wtd){
    const row=document.createElement("tr");row.className="wtd-row";
    const dr=(wtd.days_included&&wtd.days_included.length)?wtd.days_included[0].toUpperCase()+"–"+wtd.days_included[wtd.days_included.length-1].toUpperCase():"";
    row.innerHTML='<td><b>Week to Date</b> '+dr+'</td><td class="r">$'+wtd.revenue.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",")+'</td><td>'+pill(wtd.margin)+'</td><td></td>';
    tbody.appendChild(row);
  }
  grouped[wk].forEach(d=>{
    const row=document.createElement("tr");
    row.innerHTML='<td>'+d.label+'</td><td class="r">$'+d.revenue.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",")+'</td><td>'+pill(d.margin)+'</td><td><a href="'+d.file+'">Open →</a></td>';
    tbody.appendChild(row);
  });
});
</script>
</body>
</html>
