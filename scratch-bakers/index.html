<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scratch Bakers – Dashboard History</title>
<style>
:root{--bg:#0f1419;--card:#1a1f2e;--card-2:#232938;--ink:#e6edf3;--muted:#7d8ba1;--border:#2a3547;--green:#4ade80;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;--purple:#a78bfa;--orange:#f97316}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:20px;line-height:1.5}
.container{max-width:1200px;margin:0 auto}
h1{font-size:1.6rem;font-weight:700;margin-bottom:6px}
.pill{display:inline-block;font-size:.7rem;font-weight:600;padding:3px 9px;border-radius:99px;background:var(--card-2);color:var(--muted);margin-left:8px;text-transform:uppercase;letter-spacing:.05em}
.pill.owner{background:#172a4a;color:#9bc4ff}
.pill.team{background:#2a1f4a;color:#c4b5fd}
.pill.green{background:#0d2a1a;color:var(--green)}
.pill.amber{background:#2a2010;color:var(--amber)}
.pill.red{background:#2a1010;color:var(--red)}
.pill.deepgreen{background:#0a2e18;color:#86efac}
.pill.orange{background:#2a1a08;color:var(--orange)}
.subtitle{color:var(--muted);font-size:.9rem;margin-bottom:18px}
.wtd-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:18px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.wtd-card.team{grid-template-columns:repeat(2,1fr)}
.wtd-card .l{font-size:.7rem;text-transform:uppercase;color:var(--muted);letter-spacing:.05em;margin-bottom:4px}
.wtd-card .v{font-size:1.5rem;font-weight:700;font-variant-numeric:tabular-nums}
table.idx{width:100%;border-collapse:collapse;font-size:.86rem;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
table.idx th,table.idx td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
table.idx th{color:var(--muted);text-transform:uppercase;font-size:.7rem;letter-spacing:.05em;background:var(--card-2)}
table.idx td.r{text-align:right;font-variant-numeric:tabular-nums}
table.idx a{color:var(--blue);text-decoration:none}
table.idx a:hover{text-decoration:underline}
tr.wtd-row{font-weight:600}
tr.wtd-row td{border-bottom:2px solid #3a4f6a;color:var(--muted)}
</style>
</head>
<body>
<div class="container">
<h1>Scratch Bakers <span class="pill team">Team View</span> <span class="pill">Dashboard History</span></h1>
<div class="subtitle">Daily Team Dashboards · WTD rows pinned above each week</div>
<div class="wtd-card team">
<div><div class="l">Current Week Revenue</div><div class="v">$9,873.09</div></div>
<div><div class="l">Current Week Margin</div><div class="v">18.4%</div></div>
</div>
<table class="idx"><thead><tr><th>Date</th><th>Revenue</th><th>Margin</th><th></th></tr></thead><tbody id="tb"></tbody></table>
</div>
<script>
const HISTORY_DATA = [{date:"2026-06-15",label:"Mon 15 Jun 2026",revenue:9873.09,margin:18.4,surplus:1816.25,file:"Scratch Bakers – 2026-06-15 Monday – Team Dashboard.html"},{date:"2026-06-14",label:"Sun 14 Jun 2026",revenue:287.5,margin:-233.2,surplus:-670.58,file:"Scratch Bakers – 2026-06-14 Sunday – Team Dashboard.html"},{date:"2026-06-13",label:"Sat 13 Jun 2026",revenue:3910.45,margin:20.1,surplus:785.18,file:"Scratch Bakers – 2026-06-13 Saturday – Team Dashboard.html"},{date:"2026-06-12",label:"Fri 12 Jun 2026",revenue:7633.3,margin:25.5,surplus:1947.75,file:"Scratch Bakers – 2026-06-12 Friday – Team Dashboard.html"},{date:"2026-06-11",label:"Thu 11 Jun 2026",revenue:9122.01,margin:13.2,surplus:1204.27,file:"Scratch Bakers – 2026-06-11 Thursday – Team Dashboard.html"},{date:"2026-06-10",label:"Wed 10 Jun 2026",revenue:10732.34,margin:18.92,surplus:2030.87,file:"Scratch Bakers – 2026-06-10 Wednesday – Team Dashboard.html"},{date:"2026-06-09",label:"Tue 9 Jun 2026",revenue:16502.69,margin:36,surplus:5941.08,file:"Scratch Bakers – 2026-06-09 Tuesday – Team Dashboard.html"},{"date":"2026-06-08","label":"Mon 8 Jun 2026","revenue":9182.05,"margin":-21.06,"surplus":-1933.84,"file":"Scratch Bakers – 2026-06-08 Monday – Team Dashboard.html"},{"date":"2026-06-07","label":"Sun 7 Jun 2026","revenue":1557.10,"margin":23.38,"surplus":364.12,"file":"Scratch Bakers – 2026-06-07 Sunday – Team Dashboard.html"},{"date":"2026-06-06","label":"Sat 6 Jun 2026","revenue":4571.79,"margin":22.04,"surplus":1007.84,"file":"Scratch Bakers – 2026-06-06 Saturday – Team Dashboard.html"},{"date":"2026-06-05","label":"Fri 5 Jun 2026","revenue":8122.64,"margin":18.66,"surplus":1515.77,"file":"Scratch Bakers – 2026-06-05 Friday – Team Dashboard.html"},{date:"2026-06-04",label:"Thu 4 Jun 2026",revenue:9531.73,margin:30.5,surplus:2910.64,file:"Scratch Bakers – 2026-06-04 Thursday – Team Dashboard.html"},{"label":"Wed 3 Jun 2026","surplus":-262.69,"revenue":8760.79,"date":"2026-06-03","margin":-3,"file":"Scratch Bakers – 2026-06-03 Wednesday – Team Dashboard.html"},{date:"2026-06-02",label:"Tue 2 Jun 2026",revenue:7304.04,margin:-7.88,surplus:-575.58,file:"Scratch Bakers – 2026-06-02 Tuesday – Team Dashboard.html"},{date:"2026-06-01",label:"Mon 1 Jun 2026",revenue:2782.59,margin:11.05,surplus:307.54,file:"Scratch Bakers – 2026-06-01 Monday – Team Dashboard.html"},{date:"2026-05-31",label:"Sun 31 May 2026",revenue:497.95,margin:-12.13,surplus:-60.39,file:"Scratch Bakers – 2026-05-31 Sunday – Team Dashboard.html"},{"date":"2026-05-30","label":"Sat 30 May 2026","revenue":2672.04,"margin":24.34,"surplus":650.46,"file":"Scratch Bakers – 2026-05-30 Saturday – Team Dashboard.html"},{"date":"2026-05-29","label":"Fri 29 May 2026","revenue":6796.38,"margin":-10.168354329804984,"surplus":-691.08,"file":"Scratch Bakers – 2026-05-29 Friday – Team Dashboard.html"},{"date":"2026-05-28","label":"Thu 28 May 2026","revenue":9743.43,"margin":23.95,"surplus":2333.00,"file":"Scratch Bakers – 2026-05-28 Thursday – Team Dashboard.html"},{"date":"2026-05-27","label":"Wed 27 May 2026","revenue":8781.03,"margin":-3.98,"surplus":-349.37,"file":"Scratch Bakers – 2026-05-27 Wednesday – Team Dashboard.html"},{"date":"2026-05-26","label":"Tue 26 May 2026","revenue":9449.69,"margin":-1.56,"surplus":-147.29,"file":"Scratch Bakers – 2026-05-26 Tuesday – Team Dashboard.html"},{"date":"2026-05-25","label":"Mon 25 May 2026","revenue":7151.68,"margin":14.08,"surplus":1006.71,"file":"Scratch Bakers – 2026-05-25 Monday – Team Dashboard.html"},{"date":"2026-05-24","label":"Sun 24 May 2026","revenue":612.26,"margin":-90.45,"surplus":-553.84,"file":"Scratch Bakers – 2026-05-24 Sunday – Team Dashboard.html"},{"date":"2026-05-23","label":"Sat 23 May 2026","revenue":3617.67,"margin":49.55,"surplus":1792.52,"file":"Scratch Bakers – 2026-05-23 Saturday – Team Dashboard.html"},{"date":"2026-05-22","label":"Fri 22 May 2026","revenue":14210.96,"margin":45.83,"surplus":6512.45,"file":"Scratch Bakers – 2026-05-22 Friday – Team Dashboard.html"},{"date":"2026-05-21","label":"Thu 21 May 2026","revenue":14858.13,"margin":49.89,"surplus":7412.62,"file":"Scratch Bakers – 2026-05-21 Thursday – Team Dashboard.html"},{"date":"2026-05-20","label":"Wed 20 May 2026","revenue":10644.92,"margin":33.74,"surplus":3591.92,"file":"Scratch Bakers – 2026-05-20 Wednesday – Team Dashboard.html"},{"date":"2026-05-19","label":"Tue 19 May 2026","revenue":8268.55,"margin":27.27,"surplus":2255.00,"file":"Scratch Bakers – 2026-05-19 Tuesday – Team Dashboard.html"},{"date":"2026-05-18","label":"Mon 18 May 2026","revenue":8395.35,"margin":7.21,"surplus":605.56,"file":"Scratch Bakers – 2026-05-18 Monday – Team Dashboard.html"}];
const WTD_HISTORY = [{week_start:"2026-06-15",days_included:["mon"],revenue:9873.09,surplus:1816.25,margin:18.4},{week_start:"2026-06-08",days_included:["mon","tue","wed","thu","fri","sat","sun"],revenue:57370.34,surplus:9304.73,margin:16.22},{"week_start":"2026-06-01","days_included":["mon","tue","wed","thu","fri","sat","sun"],"revenue":42630.68,"surplus":5267.64,"margin":12.36},{week_start:"2026-05-25",days_included:["mon","tue","wed","thu","fri","sat","sun"],revenue:45092.2,surplus:2742.04,margin:6.08},{"week_start":"2026-05-18","days_included":["mon","tue","wed","thu","fri","sat","sun"],"revenue":60607.84,"surplus":21616.23,"margin":35.67}];
const THR = 15;
function isoWeek(iso){const d=new Date(iso);const day=(d.getUTCDay()+6)%7;d.setUTCDate(d.getUTCDate()-day);return d.toISOString().slice(0,10);}
function fmt(n){const v=(n==null||isNaN(n))?0:Number(n);return '$'+v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function n0(x){return (x==null||isNaN(x))?null:Number(x);}
function pctCls(m,t){if(m==null)return 'orange';return m>=t+10?'deepgreen':m>=t?'green':m>=t-5?'amber':m>=0?'orange':'red';}
function mPct(m){return m==null?'—':m.toFixed(1)+'%';}
function render(){
  const groups={};
  HISTORY_DATA.forEach(r=>{const w=isoWeek(r.date);if(!groups[w])groups[w]=[];groups[w].push(r);});
  const tb=document.getElementById('tb');tb.innerHTML='';
  const sortedWeeks=Object.keys(groups).sort().reverse();
  const dayMap={mon:'Mon',tue:'Tue',wed:'Wed',thu:'Thu',fri:'Fri',sat:'Sat',sun:'Sun'};
  sortedWeeks.forEach(w=>{
    const wtd=WTD_HISTORY.find(x=>x.week_start===w);
    if(wtd){
      const tr=document.createElement('tr');tr.className='wtd-row';
      const dlist=(wtd.days_included||[]).map(d=>dayMap[d]).join(' ');
      const m=n0(wtd.margin);
      tr.innerHTML='<td>Week to Date<br><span style="font-weight:400;font-size:.78rem">'+dlist+'</span></td><td class="r">'+fmt(wtd.revenue)+'</td><td><span class="pill '+pctCls(m,THR)+'">'+mPct(m)+'</span></td><td></td>';
      tb.appendChild(tr);
    }
    groups[w].forEach(r=>{
      const tr=document.createElement('tr');
      const m=n0(r.margin);
      tr.innerHTML='<td>'+r.label+'</td><td class="r">'+fmt(r.revenue)+'</td><td><span class="pill '+pctCls(m,THR)+'">'+mPct(m)+'</span></td><td><a href="'+r.file+'">Open '+'→'+'</a></td>';
      tb.appendChild(tr);
    });
  });
}
render();
</script>
</body>
</html>
