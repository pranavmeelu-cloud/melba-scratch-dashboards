<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Queen Street – Dashboard History</title>
<style>
:root{--bg:#0f1419;--card:#1a1f2e;--card-2:#232938;--ink:#e6edf3;--muted:#7d8ba1;--border:#2a3547;--green:#4ade80;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;--purple:#a78bfa;--orange:#f97316}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:20px;line-height:1.5}
.container{max-width:1200px;margin:0 auto}
h1{font-size:1.6rem;font-weight:700;margin-bottom:6px}
.pill{display:inline-block;font-size:.7rem;font-weight:600;padding:3px 9px;border-radius:99px;background:var(--card-2);color:var(--muted);margin-left:8px;text-transform:uppercase;letter-spacing:.05em}
.pill.owner{background:#172a4a;color:#9bc4ff}
.pill.team{background:#2a1f4a;color:#c4b5fd}
.pill.green{background:#0d2a1a;color:var(--green)}
.pill.amber{background:#2a2010;color:var(--amber)}
.pill.red{background:#2a1010;color:var(--red)}
.pill.deepgreen{background:#0a2e18;color:#86efac}
.pill.orange{background:#2a1a08;color:var(--orange)}
.subtitle{color:var(--muted);font-size:.9rem;margin-bottom:18px}
.wtd-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:18px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.wtd-card .l{font-size:.7rem;text-transform:uppercase;color:var(--muted);letter-spacing:.05em;margin-bottom:4px}
.wtd-card .v{font-size:1.5rem;font-weight:700;font-variant-numeric:tabular-nums}
table.idx{width:100%;border-collapse:collapse;font-size:.86rem;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
table.idx th,table.idx td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
table.idx th{color:var(--muted);text-transform:uppercase;font-size:.7rem;letter-spacing:.05em;background:var(--card-2)}
table.idx td.r{text-align:right;font-variant-numeric:tabular-nums}
table.idx a{color:var(--blue);text-decoration:none}
table.idx a:hover{text-decoration:underline}
tr.wtd-row{font-weight:600}
tr.wtd-row td{border-bottom:2px solid #3a4f6a;color:var(--muted)}
</style>
</head>
<body>
<div class="container">
<h1>Queen Street <span class="pill team">Team View</span> <span class="pill">Dashboard History</span></h1>
<div class="subtitle">Daily Team Dashboards · WTD rows pinned above each week</div>
<div class="wtd-card">
<div><div class="l">Current Week Revenue</div><div class="v">$3,596.10</div></div>
<div><div class="l">Current Week Surplus</div><div class="v">$817.87</div></div>
<div><div class="l">Current Week Margin</div><div class="v">22.7%</div></div>
</div>
<table class="idx"><thead><tr><th>Date</th><th>Revenue</th><th>Surplus</th><th>Margin</th><th></th></tr></thead><tbody id="tb"></tbody></table>
</div>
<script>
const HISTORY_DATA = [{date:"2026-05-31",label:"Sun 31 May 2026",revenue:0,margin:0,surplus:0,file:"Queen Street – 2026-05-31 Sunday – Team Dashboard.html"},{"date":"2026-05-30","label":"Sat 30 May 2026","revenue":0.00,"margin":null,"surplus":0.00,"file":"Queen Street – 2026-05-30 Saturday – Team Dashboard.html"},{"date":"2026-05-29","label":"Fri 29 May 2026","revenue":770,"margin":35.364935064935068,"surplus":272.31,"file":"Queen Street – 2026-05-29 Friday – Team Dashboard.html"},{"date":"2026-05-28","label":"Thu 28 May 2026","revenue":720.20,"margin":32.94,"surplus":237.22,"file":"Queen Street – 2026-05-28 Thursday – Team Dashboard.html"},{"date":"2026-05-27","label":"Wed 27 May 2026","revenue":793.2,"margin":20.08,"surplus":159.24,"file":"Queen Street – 2026-05-27 Wednesday – Team Dashboard.html"},{"date":"2026-05-26","label":"Tue 26 May 2026","revenue":795.80,"margin":10.58,"surplus":84.21,"file":"Queen Street – 2026-05-26 Tuesday – Team Dashboard.html"},{"date":"2026-05-25","label":"Mon 25 May 2026","revenue":516.9,"margin":12.55,"surplus":64.89,"file":"Queen Street – 2026-05-25 Monday – Team Dashboard.html"},{"date":"2026-05-24","label":"Sun 24 May 2026","revenue":0.00,"margin":0,"surplus":0.00,"file":"Queen Street – 2026-05-24 Sunday – Team Dashboard.html"},{"date":"2026-05-23","label":"Sat 23 May 2026","revenue":0.00,"margin":0,"surplus":0.00,"file":"Queen Street – 2026-05-23 Saturday – Team Dashboard.html"},{"date":"2026-05-22","label":"Fri 22 May 2026","revenue":786.1,"margin":30.46,"surplus":239.43,"file":"Queen Street – 2026-05-22 Friday – Team Dashboard.html"},{"date":"2026-05-21","label":"Thu 21 May 2026","revenue":754.70,"margin":11.26,"surplus":84.97,"file":"Queen Street – 2026-05-21 Thursday – Team Dashboard.html"},{"date":"2026-05-20","label":"Wed 20 May 2026","revenue":797.00,"margin":15.70,"surplus":125.11,"file":"Queen Street – 2026-05-20 Wednesday – Team Dashboard.html"},{"date":"2026-05-19","label":"Tue 19 May 2026","revenue":637.40,"margin":-1.61,"surplus":-10.26,"file":"Queen Street – 2026-05-19 Tuesday – Team Dashboard.html"},{"date":"2026-05-18","label":"Mon 18 May 2026","revenue":528.20,"margin":4.47,"surplus":23.62,"file":"Queen Street – 2026-05-18 Monday – Team Dashboard.html"}];
const WTD_HISTORY = [{week_start:"2026-05-25",days_included:["mon","tue","wed","thu","fri","sat","sun"],revenue:3596.1,surplus:817.87,margin:22.74},{"week_start":"2026-05-18","days_included":["mon","tue","wed","thu","fri","sat","sun"],"revenue":3503.4,"surplus":462.87,"margin":13.21}];
const THR = 20;
function isoWeek(iso){const d=new Date(iso);const day=(d.getUTCDay()+6)%7;d.setUTCDate(d.getUTCDate()-day);return d.toISOString().slice(0,10);}
function fmt(n){const v=(n==null||isNaN(n))?0:Number(n);return '$'+v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function n0(x){return (x==null||isNaN(x))?null:Number(x);}
function pctCls(m,t){if(m==null)return 'orange';return m>=t+10?'deepgreen':m>=t?'green':m>=t-5?'amber':m>=0?'orange':'red';}
function mPct(m){return m==null?'':m.toFixed(1)+'%';}
function render(){
  const groups={};
  HISTORY_DATA.forEach(r=>{const w=isoWeek(r.date);if(!groups[w])groups[w]=[];groups[w].push(r);});
  const tb=document.getElementById('tb');tb.innerHTML='';
  const sortedWeeks=Object.keys(groups).sort().reverse();
  const dayMap={mon:'Mon',tue:'Tue',wed:'Wed',thu:'Thu',fri:'Fri',sat:'Sat',sun:'Sun'};
  sortedWeeks.forEach(w=>{
    const wtd=WTD_HISTORY.find(x=>x.week_start===w);
    if(wtd){
      const tr=document.createElement('tr');tr.className='wtd-row';
      const dlist=(wtd.days_included||[]).map(d=>dayMap[d]).join(' ');
      const m=n0(wtd.margin);
      tr.innerHTML='<td>Week to Date<br><span style="font-weight:400;font-size:.78rem">'+dlist+'</span></td><td class="r">'+fmt(wtd.revenue)+'</td><td class="r">'+fmt(wtd.surplus)+'</td><td><span class="pill '+pctCls(m,THR)+'">'+mPct(m)+'</span></td><td></td>';
      tb.appendChild(tr);
    }
    groups[w].forEach(r=>{
      const tr=document.createElement('tr');
      const m=n0(r.margin);
      tr.innerHTML='<td>'+r.label+'</td><td class="r">'+fmt(r.revenue)+'</td><td class="r">'+fmt(r.surplus)+'</td><td><span class="pill '+pctCls(m,THR)+'">'+mPct(m)+'</span></td><td><a href="'+r.file+'">Open '+'→'+'</a></td>';
      tb.appendChild(tr);
    });
  });
}
render();
</script>
</body>
</html>
