<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Queen Street – Dashboard History</title>
<style>
:root{--bg:#0f1419;--card:#1a1f2e;--card-2:#232938;--ink:#e6edf3;--muted:#7d8ba1;--border:#2a3547;--green:#4ade80;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;--purple:#a78bfa;--orange:#f97316}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:20px;line-height:1.5}
.container{max-width:1200px;margin:0 auto}
h1{font-size:1.6rem;font-weight:700;margin-bottom:6px}
.pill{display:inline-block;font-size:.7rem;font-weight:600;padding:3px 9px;border-radius:99px;background:var(--card-2);color:var(--muted);margin-left:8px;text-transform:uppercase;letter-spacing:.05em}
.pill.owner{background:#172a4a;color:#9bc4ff}
.pill.team{background:#2a1f4a;color:#c4b5fd}
.pill.green{background:#0d2a1a;color:var(--green)}
.pill.amber{background:#2a2010;color:var(--amber)}
.pill.red{background:#2a1010;color:var(--red)}
.pill.deepgreen{background:#0a2e18;color:#86efac}
.pill.orange{background:#2a1a08;color:var(--orange)}
.subtitle{color:var(--muted);font-size:.9rem;margin-bottom:18px}
.wtd-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:18px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.wtd-card.team{grid-template-columns:repeat(2,1fr)}
.wtd-card .l{font-size:.7rem;text-transform:uppercase;color:var(--muted);letter-spacing:.05em;margin-bottom:4px}
.wtd-card .v{font-size:1.5rem;font-weight:700;font-variant-numeric:tabular-nums}
table.idx{width:100%;border-collapse:collapse;font-size:.86rem;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
table.idx th,table.idx td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
table.idx th{color:var(--muted);text-transform:uppercase;font-size:.7rem;letter-spacing:.05em;background:var(--card-2)}
table.idx td.r{text-align:right;font-variant-numeric:tabular-nums}
table.idx a{color:var(--blue);text-decoration:none}
table.idx a:hover{text-decoration:underline}
tr.wtd-row{font-weight:600}
tr.wtd-row td{border-bottom:2px solid #3a4f6a;color:var(--muted)}
</style>
</head>
<body>
<div class="container">
<h1>Queen Street <span class="pill team">Team View</span> <span class="pill">Dashboard History</span></h1>
<div class="subtitle">Daily Team Dashboards · WTD rows pinned above each week</div>

<div><div class="l">Current Week Revenue</div><div class="v">$2,732.20</div></div>

</div>
<table class="idx"><thead><tr><th>Date</th><th>Revenue</th><th>Margin</th><th></th></tr></thead><tbody id="tb"></tbody></table>
</div>

 – 2026-06-12 Friday – Team Dashboard.html"},{date:"2026-06-11",label:"Thu 11 Jun 2026",revenue:772.9,margin:36.6,surplus:282.71,file:"Queen Street – 2026-06-11 Thursday – Team Dashboard.html"},{date:"2026-06-10",label:"Wed 10 Jun 2026",revenue:646.36,margin:31.96,surplus:206.59,file:"Queen Street – 2026-06-10 Wednesday – Team Dashboard.html"},{date:"2026-06-09",label:"Tue 9 Jun 2026",revenue:692.3,margin:45.42,surplus:314.45,file:"Queen Street – 2026-06-09 Tuesday – Team Dashboard.html"},{"date":"2026-06-08","label":"Mon 8 Jun 2026","revenue":623.80,"margin":29.61,"surplus":184.68,"file":"Queen Street – 2026-06-08 Monday – Team Dashboard.html"},{"date":"2026-06-07","label":"Sun 7 Jun 2026","revenue":0.00,"margin":null,"surplus":0.00,"file":"Queen Street – 2026-06-07 Sunday – Team Dashboard.html"},{"date":"2026-06-06","label":"Sat 6 Jun 2026","revenue":0.00,"margin":null,"surplus":0.00,"file":"Queen Street – 2026-06-06 Saturday – Team Dashboard.html"},{"date":"2026-06-05","label":"Fri 5 Jun 2026","revenue":790.3,"margin":37.31,"surplus":294.86,"file":"Queen Street – 2026-06-05 Friday – Team Dashboard.html"},{date:"2026-06-04",label:"Thu 4 Jun 2026",revenue:718,margin:34.9,surplus:250.58,file:"Queen Street – 2026-06-04 Thursday – Team Dashboard.html"},{"label":"Wed 3 Jun 2026","surplus":261.93,"revenue":753.8,"date":"2026-06-03","margin":34.75,"file":"Queen Street – 2026-06-03 Wednesday – Team Dashboard.html"},{date:"2026-06-02",label:"Tue 2 Jun 2026",revenue:648.2,margin:20.4,surplus:132.26,file:"Queen Street – 2026-06-02 Tuesday – Team Dashboard.html"},{date:"2026-06-01",label:"Mon 1 Jun 2026",revenue:0,margin:0,surplus:0,file:"Queen Street – 2026-06-01 Monday – Team Dashboard.html"},{date:"2026-05-31",label:"Sun 31 May 2026",revenue:0,margin:0,surplus:0,file:"Queen Street – 2026-05-31 Sunday – Team Dashboard.html"},{"date":"2026-05-30","label":"Sat 30 May 2026","revenue":0.00,"margin":null,"surplus":0.00,"file":"Queen Street – 2026-05-30 Saturday – Team Dashboard. const WTD_HISTORY = [{week_start:"2026-06-22",days_included:["mon","tue","wed","thu"],revenue:2732.2,surplus:643.9,margin:23.57},{week_start:"2026-06-15",days_included:["mon","tue","wed","thu","fri","sat","sun"],revenue:3354.9,surplus:796.09,margin:23.73},{week_start:"2026-06-08",days_included:["mon","tue","wed","thu","fri","sat","sun"],revenue:3343.76,surplus:1148.06,margin:34.33},{"week_start":"2026-06-01","days_included":["mon","tue","wed","thu","fri","sat","sun"],"revenue":2910.30,"surplus":939.63,"margin":32.29},{week_start:"2026-05-25",days_included:["mon","tue","wed","thu","fri","sat","sun"],revenue:3596.1,surplus:817.87,margin:22.74},{"week_start":"2026-05-18","days_included":["mon","tue","wed","thu","fri","sat","sun"],"revenue":3503.4,"surplus":462.87,"margin":13.21}];
const THR = 20;
function isoWeek(iso){const d=new Date(iso);const day=(d.getUTCDay()+6)%7;d.setUTCDate(d.getUTCDate()-day);return d.toISOString().slice(0,10);}
function fmt(n){const v=(n==null||isNaN(n))?0:Number(n);return '$'+v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function n0(x){return (x==null||isNaN(x))?null:Number(x);}
function pctCls(m,t){if(m==null)return 'orange';return m>=t+10?'deepgreen':m>=t?'green':m>=t-5?'amber':m>=0?'orange':'red';}
function mPct(m){return m==null?'—':m.toFixed(1)+'%';}
function render(){
  const groups={};
  HISTORY_DATA.forEach(r=>{const w=isoWeek(r.date);if(!groups[w])groups[w]=[];groups[w].push(r);});
  const tb=document.getElementById('tb');tb.innerHTML='';
  const sortedWeeks=Object.keys(groups).sort().reverse();
  const dayMap={mon:'Mon',tue:'Tue',wed:'Wed',thu:'Thu',fri:'Fri',sat:'Sat',sun:'Sun'};
  sortedWeeks.forEach(w=>{
    const wtd=WTD_HISTORY.find(x=>x.week_start===w);
    if(wtd){
      const tr=document.createElement('tr');tr.className='wtd-row';
      const dlist=(wtd.days_included||[]).map(d=>dayMap[d]).join(' ');
      const m=n0(wtd.margin);
      tr.innerHTML='<td>Week to Date<br><span style="font-weight:400;font-size:.78rem">'+dlist+'</span></td><td class="r">'+fmt(wtd.revenue)+'</td><td><span class="pill '+pctCls(m,THR)+'">'+mPct(m)+'</span></td><td></td>';
      tb.appendChild(tr);
    }
    groups[w].forEach(r=>{
      const tr=document.createElement('tr');
      const m=n0(r.margin);
      tr.innerHTML='<td>'+r.label+'</td><td class="r">'+fmt(r.revenue)+'</td><td><span class="pill '+pctCls(m,THR)+'">'+mPct(m)+'</span></td><td><a href="'+r.file+'">Open '+'→'+'</a></td>';
      tb.appendChild(tr);
    });
  });
}
render();
